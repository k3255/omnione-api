site_name: Docs Portal
site_description: Consolidated Markdown docs from OmniOneID repositories

theme:
  name: material
  logo: images/logo.png
  palette:
    primary: orange
    accent: deep orange
  features:
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Collected Docs: collected-index.md
  - By Branch:
      - develop:
          - Overview: collected/develop/index.md
          - did-api-server:
              - Api:
                - APIGateway API: collected/develop/did-api-server/api/APIGateway_API.md
                - APIGateway API Ko: collected/develop/did-api-server/api/APIGateway_API_ko.md
              - errorCode:
                - APIGateway ErrorCode: collected/develop/did-api-server/errorCode/APIGateway_ErrorCode.md
                - APIGateway ErrorCode Ko: collected/develop/did-api-server/errorCode/APIGateway_ErrorCode_ko.md
              - Installation:
                - OpenDID APIGatewayServer InstallationAndOperation Guide: collected/develop/did-api-server/installation/OpenDID_APIGatewayServer_InstallationAndOperation_Guide.md
                - OpenDID APIGatewayServer InstallationAndOperation Guide Ko: collected/develop/did-api-server/installation/OpenDID_APIGatewayServer_InstallationAndOperation_Guide_ko.md
          - did-blockchain-sdk-server:
              - Api:
                - Blockchain API: collected/develop/did-blockchain-sdk-server/api/Blockchain_API.md
                - Blockchain API Ko: collected/develop/did-blockchain-sdk-server/api/Blockchain_API_ko.md
                - Blockchain EVM API: collected/develop/did-blockchain-sdk-server/api/Blockchain_EVM_API.md
                - BlockchainErrorCode: collected/develop/did-blockchain-sdk-server/api/BlockchainErrorCode.md
          - did-ca-server:
              - Admin:
                - OpenDID CAAdmin Operation Guide: collected/develop/did-ca-server/admin/OpenDID_CAAdmin_Operation_Guide.md
                - OpenDID CAAdmin Operation Guide Ko: collected/develop/did-ca-server/admin/OpenDID_CAAdmin_Operation_Guide_ko.md
              - Api:
                - CAS API: collected/develop/did-ca-server/api/CAS_API.md
                - CAS API Ko: collected/develop/did-ca-server/api/CAS_API_ko.md
              - Db:
                - OpenDID TableDefinition CAS: collected/develop/did-ca-server/db/OpenDID_TableDefinition_CAS.md
                - OpenDID TableDefinition CAS Ko: collected/develop/did-ca-server/db/OpenDID_TableDefinition_CAS_ko.md
              - errorCode:
                - CA ErrorCode: collected/develop/did-ca-server/errorCode/CA_ErrorCode.md
                - CA ErrorCode Kd: collected/develop/did-ca-server/errorCode/CA_ErrorCode_kd.md
              - Installation:
