              - Eosio.wrap: collected/develop/eosio.contracts/eosio.wrap.md

plugins:
  - search

extra_javascript:
  - assets/javascripts/category-filter.js

extra_css:
  - assets/stylesheets/category-filter.css

markdown_extensions:
  - toc:
      permalink: true
      slugify: !!python/name:markdown.extensions.toc.slugify_unicode
  - tables
  - fenced_code
